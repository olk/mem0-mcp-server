# Kubernetes service template for mem0-mcp-server
# FR-HELM-1: Helm chart with proper templates and values schema
# Service type: LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mem0-mcp-server.fullname" . }}
  labels:
    {{- include "mem0-mcp-server.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "mem0-mcp-server.selectorLabels" . | nindent 4 }}
---
# Ingress for external access
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mem0-mcp-server.fullname" . }}
  labels:
    {{- include "mem0-mcp-server.labels" . | nindent 4 }}
  annotations:
    {{- range $key, $value := .Values.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "mem0-mcp-server.fullname" $ }}
                port:
                  number: {{ $.Values.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
